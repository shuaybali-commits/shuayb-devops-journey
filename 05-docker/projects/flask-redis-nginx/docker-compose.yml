# Challenge-docker-compose.yml
services:
  web:
    build:
      context: .
      dockerfile: Challenge-Dockerfile
    expose:
      - "5003"
    environment:
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    depends_on:
      - redis

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:latest
    ports:
      - "5003:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  redis-data:

